<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Spark</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%;
    background: #000;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Segoe UI', sans-serif;
    overflow: hidden;
  }
  .container {
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    width: 100vw; height: 100vh;
    position: relative;
  }
 
  /* ── Stars background ── */
  .stars {
    position: fixed; inset: 0; z-index: 0;
    background: radial-gradient(ellipse at center, #050d1a 0%, #000 100%);
    overflow: hidden;
  }
  .stars::before, .stars::after {
    content: '';
    position: absolute; inset: 0;
    background-image:
      radial-gradient(1px 1px at 10% 20%, rgba(255,255,255,0.4) 0%, transparent 100%),
      radial-gradient(1px 1px at 30% 60%, rgba(255,255,255,0.3) 0%, transparent 100%),
      radial-gradient(1px 1px at 55% 15%, rgba(255,255,255,0.35) 0%, transparent 100%),
      radial-gradient(1px 1px at 75% 45%, rgba(255,255,255,0.25) 0%, transparent 100%),
      radial-gradient(1px 1px at 90% 80%, rgba(255,255,255,0.4) 0%, transparent 100%),
      radial-gradient(1px 1px at 20% 85%, rgba(255,255,255,0.3) 0%, transparent 100%),
      radial-gradient(1px 1px at 65% 70%, rgba(255,255,255,0.35) 0%, transparent 100%),
      radial-gradient(1px 1px at 45% 40%, rgba(255,255,255,0.2) 0%, transparent 100%);
    background-size: 400px 400px;
    animation: twinkle 6s ease-in-out infinite alternate;
  }
  .stars::after {
    background-size: 300px 300px;
    animation-duration: 9s;
    animation-direction: alternate-reverse;
    opacity: 0.6;
  }
  @keyframes twinkle {
    0%   { opacity: 0.6; }
    100% { opacity: 1; }
  }
 
  /* ── Orb ── */
  .orb-wrapper {
    position: relative; z-index: 2;
    width: 240px; height: 240px;
    display: flex; align-items: center; justify-content: center;
    margin-bottom: 36px;
  }
 
  .ring {
    position: absolute;
    border-radius: 50%;
    border: 1.5px solid rgba(0, 180, 255, 0.4);
  }
  .ring1 { width: 240px; height: 240px; animation: spin1 5s linear infinite; }
  .ring2 { width: 196px; height: 196px; animation: spin2 3.5s linear infinite; }
  .ring3 { width: 155px; height: 155px; animation: spin3 7s linear infinite; }
 
  @keyframes spin1 {
    0%   { transform: rotate(0deg)   scaleY(0.28); }
    25%  { transform: rotate(90deg)  scaleX(0.28); }
    50%  { transform: rotate(180deg) scaleY(0.28); }
    75%  { transform: rotate(270deg) scaleX(0.28); }
    100% { transform: rotate(360deg) scaleY(0.28); }
  }
  @keyframes spin2 {
    0%   { transform: rotate(0deg)   scaleX(0.28); }
    25%  { transform: rotate(90deg)  scaleY(0.28); }
    50%  { transform: rotate(180deg) scaleX(0.28); }
    75%  { transform: rotate(270deg) scaleY(0.28); }
    100% { transform: rotate(360deg) scaleX(0.28); }
  }
  @keyframes spin3 {
    0%   { transform: rotate(45deg)  scaleY(0.28); }
    50%  { transform: rotate(225deg) scaleX(0.28); }
    100% { transform: rotate(405deg) scaleY(0.28); }
  }
 
  .core {
    width: 108px; height: 108px;
    border-radius: 50%;
    background: radial-gradient(circle at 32% 32%, #b0eeff, #1a9fff 42%, #0055dd 72%, #001a77);
    box-shadow:
      0 0 40px rgba(0,150,255,0.85),
      0 0 90px rgba(0,100,255,0.45),
      inset 0 0 22px rgba(255,255,255,0.22);
    animation: pulse 2.2s ease-in-out infinite;
    z-index: 3;
    cursor: pointer;
    transition: transform 0.1s;
  }
  .core:active { transform: scale(0.94); }
 
  @keyframes pulse {
    0%,100% { transform: scale(1);    box-shadow: 0 0 40px rgba(0,150,255,0.85), 0 0 90px rgba(0,100,255,0.45); }
    50%      { transform: scale(1.09); box-shadow: 0 0 65px rgba(0,190,255,1),    0 0 130px rgba(0,130,255,0.65); }
  }
  @keyframes pulse-fast {
    0%,100% { transform: scale(1);    box-shadow: 0 0 55px rgba(0,210,255,1),    0 0 110px rgba(0,160,255,0.7); }
    50%      { transform: scale(1.13); box-shadow: 0 0 75px rgba(0,230,255,1),    0 0 150px rgba(0,180,255,0.85); }
  }
  @keyframes speaking-morph {
    0%   { transform: scale(1.0)  scaleX(1.00); }
    10%  { transform: scale(1.14) scaleX(1.06); }
    22%  { transform: scale(0.94) scaleX(0.96); }
    34%  { transform: scale(1.11) scaleX(1.04); }
    48%  { transform: scale(0.97) scaleX(0.99); }
    60%  { transform: scale(1.08) scaleX(1.02); }
    75%  { transform: scale(0.96) scaleX(0.97); }
    88%  { transform: scale(1.05); }
    100% { transform: scale(1.0)  scaleX(1.00); }
  }
  @keyframes thinking-rot {
    0%   { transform: scale(1.02) rotate(0deg); }
    100% { transform: scale(1.02) rotate(360deg); }
  }
 
  /* Particles */
  .particle {
    position: absolute;
    width: 4px; height: 4px;
    border-radius: 50%;
    background: rgba(100,220,255,0.9);
    top: calc(50% - 2px);
    left: calc(50% - 2px);
    animation: orbit linear infinite;
  }
  @keyframes orbit {
    from { transform: rotate(var(--a)) translateX(var(--r)) scale(1);   opacity: 1; }
    50%  {                                                                opacity: 0.35; }
    to   { transform: rotate(calc(var(--a) + 360deg)) translateX(var(--r)) scale(0.5); opacity: 1; }
  }
 
  /* ── Wave bars ── */
  .wave-bars {
    display: flex; align-items: center; gap: 3px;
    height: 26px; margin-bottom: 10px;
    opacity: 0; transition: opacity 0.35s;
    z-index: 2;
  }
  .wave-bars.active { opacity: 1; }
  .bar {
    width: 3px; border-radius: 2px;
    background: rgba(0,210,255,0.75);
    animation: wave 0.85s ease-in-out infinite;
  }
  .bar:nth-child(1){animation-delay:0s}   .bar:nth-child(2){animation-delay:.1s}
  .bar:nth-child(3){animation-delay:.2s}  .bar:nth-child(4){animation-delay:.3s}
  .bar:nth-child(5){animation-delay:.1s}  .bar:nth-child(6){animation-delay:.25s}
  .bar:nth-child(7){animation-delay:.05s}
  @keyframes wave {
    0%,100% { height: 4px; }
    50%      { height: 22px; }
  }
 
  /* ── Text ── */
  .status-text {
    color: rgba(0,210,255,0.9);
    font-size: 13px;
    letter-spacing: 4px;
    text-transform: uppercase;
    margin-bottom: 12px;
    z-index: 2;
    animation: fadein 0.4s ease;
    min-height: 20px;
  }
  .transcript {
    color: rgba(160,220,255,0.65);
    font-size: 14px;
    max-width: 360px;
    text-align: center;
    line-height: 1.6;
    z-index: 2;
    min-height: 24px;
    transition: opacity 0.3s;
  }
  @keyframes fadein { from{opacity:0} to{opacity:1} }
 
  /* ── Name label ── */
  .name-label {
    position: fixed; top: 32px;
    color: rgba(0,200,255,0.5);
    font-size: 11px;
    letter-spacing: 6px;
    text-transform: uppercase;
    z-index: 5;
  }
</style>
</head>
<body>
<div class="stars"></div>
<div class="name-label">SPARK</div>
<div class="container">
  <div class="orb-wrapper" id="orbWrapper">
    <div class="ring ring1" id="r1"></div>
    <div class="ring ring2" id="r2"></div>
    <div class="ring ring3" id="r3"></div>
    <div class="core"       id="core"></div>
  </div>
  <div class="wave-bars" id="waveBars">
    <div class="bar"></div><div class="bar"></div><div class="bar"></div>
    <div class="bar"></div><div class="bar"></div><div class="bar"></div>
    <div class="bar"></div>
  </div>
  <div class="status-text" id="statusText">Idle</div>
  <div class="transcript"  id="transcript">Initializing...</div>
</div>
 
<script src="https://cdn.jsdelivr.net/npm/socket.io-client@4.7.2/dist/socket.io.min.js"></script>
<script>
const core      = document.getElementById('core');
const r1        = document.getElementById('r1');
const r2        = document.getElementById('r2');
const r3        = document.getElementById('r3');
const statusTxt = document.getElementById('statusText');
const transcript= document.getElementById('transcript');
const waveBars  = document.getElementById('waveBars');
const wrapper   = document.getElementById('orbWrapper');
 
// ── Particles ──
for (let i = 0; i < 9; i++) {
  const p = document.createElement('div');
  p.className = 'particle';
  const angle  = (i / 9) * 360;
  const radius = 96 + Math.random() * 18;
  p.style.cssText = `--a:${angle}deg;--r:${radius}px;animation-duration:${3+Math.random()*4}s;animation-delay:${-Math.random()*4}s`;
  wrapper.appendChild(p);
}
 
// ── State configs ──
const STATES = {
  idle: {
    label: 'Idle',
    sub:   'Standing by, sir.',
    coreAnim: 'pulse 2.2s ease-in-out infinite',
    r1Speed: '5s', r2Speed: '3.5s', r3Speed: '7s',
    ringColor: 'rgba(0,180,255,0.4)',
    wave: false,
  },
  listening: {
    label: 'Listening',
    sub:   'Say something, sir.',
    coreAnim: 'pulse-fast 0.9s ease-in-out infinite',
    r1Speed: '2s', r2Speed: '1.4s', r3Speed: '3s',
    ringColor: 'rgba(0,230,255,0.65)',
    wave: true,
  },
  thinking: {
    label: 'Thinking',
    sub:   'Processing your query...',
    coreAnim: 'thinking-rot 3s linear infinite',
    r1Speed: '9s', r2Speed: '7s', r3Speed: '12s',
    ringColor: 'rgba(140,80,255,0.55)',
    wave: false,
  },
  speaking: {
    label: 'Speaking',
    sub:   'Right away, sir.',
    coreAnim: 'speaking-morph 1.1s ease-in-out infinite',
    r1Speed: '1.6s', r2Speed: '1.1s', r3Speed: '2.2s',
    ringColor: 'rgba(0,200,255,0.7)',
    wave: false,
  },
};
 
function setState(name) {
  const cfg = STATES[name] || STATES.idle;
 
  // text
  statusTxt.style.animation = 'none';
  statusTxt.offsetHeight;
  statusTxt.style.animation = 'fadein 0.4s ease';
  statusTxt.textContent = cfg.label;
  transcript.textContent = cfg.sub;
 
  // core
  core.style.animation = cfg.coreAnim;
 
  // rings speed + color
  [r1,r2,r3].forEach((r,i) => {
    const spds = [cfg.r1Speed, cfg.r2Speed, cfg.r3Speed];
    r.style.animationDuration = spds[i];
    r.style.borderColor = cfg.ringColor;
  });
 
  // wave bars
  waveBars.className = 'wave-bars' + (cfg.wave ? ' active' : '');
}
 
// ── SocketIO connection ──
const socket = io('http://localhost:5000');
 
socket.on('connect',       () => { setState('idle'); transcript.textContent = 'Connected, sir.'; });
socket.on('disconnect',    () => { setState('idle'); transcript.textContent = 'Connection lost.'; });
socket.on('state',         (data) => setState(data.state));
 
// fallback if socket never connects
setTimeout(() => {
  if (!socket.connected) {
    setState('idle');
    transcript.textContent = 'Waiting for Spark...';
  }
}, 3000);
</script>
</body>
</html>
